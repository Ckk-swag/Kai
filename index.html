<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <meta name="theme-color" content="#b8f2e6" />
  <title>开开的博士成长计划</title>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <style>
    :root {
      --bg: #f4fffb;
      --card: rgba(255,255,255,.88);
      --text: #111827;
      --sub: #4b5563;
      --line: #d8f3ea;
      --mint: #7ee7d4;
      --green: #16a085;
      --danger-bg: #ffe4ee;
      --danger: #b83268;
      --yellow: #fff4bf;
      --shadow: 0 20px 55px rgba(94,203,184,.18);
      --radius: 24px;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      min-height: 100vh;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "PingFang SC", "Microsoft YaHei", sans-serif;
      color: var(--text);
      background:
        radial-gradient(circle at top left, #dffbf4 0, #f4fffb 34%, transparent 60%),
        radial-gradient(circle at bottom right, #b8f2e6 0, #f4fffb 30%, transparent 58%),
        linear-gradient(135deg, #f4fffb, #ecfff8);
    }
    button, input, select, textarea { font: inherit; }
    button { cursor: pointer; border: 0; border-radius: 15px; padding: 12px 14px; font-weight: 900; transition: .16s ease; }
    button:hover { transform: translateY(-1px); }
    input, select, textarea {
      width: 100%;
      border: 1px solid var(--line);
      border-radius: 15px;
      padding: 13px 14px;
      background: #fff;
      color: var(--text);
      outline: none;
    }
    input:focus, select:focus, textarea:focus { border-color: #6edac6; box-shadow: 0 0 0 4px rgba(184,242,230,.45); }
    textarea { min-height: 160px; line-height: 1.7; resize: vertical; }
    .app { display: grid; grid-template-columns: 305px 1fr; min-height: 100vh; }
    .side {
      position: sticky; top: 0; height: 100vh; overflow: auto;
      padding: 22px; background: rgba(255,255,255,.75); backdrop-filter: blur(16px);
      border-right: 1px solid var(--line); display: flex; flex-direction: column; gap: 14px;
    }
    .brand { display: flex; align-items: center; gap: 12px; }
    .logo { width: 50px; height: 50px; border-radius: 18px; display: grid; place-items: center; background: linear-gradient(135deg,#2dd4bf,#7dd3fc); color: #fff; font-size: 24px; font-weight: 900; box-shadow: var(--shadow); }
    .brand h1 { margin: 0; font-size: 20px; line-height: 1.25; }
    .brand p { margin: 5px 0 0; color: var(--sub); font-size: 13px; }
    .card { background: var(--card); border: 1px solid var(--line); border-radius: var(--radius); box-shadow: var(--shadow); padding: 18px; }
    .today-card { background: linear-gradient(135deg,#fff,#e8fff8); }
    .status { display: inline-flex; border-radius: 999px; padding: 6px 10px; font-size: 12px; font-weight: 900; background: var(--yellow); color: #7a6510; }
    .status.ok { background: #dffbf4; color: #064e3b; }
    .status.warn { background: var(--danger-bg); color: var(--danger); }
    .nav { display: grid; gap: 8px; }
    .nav button { background: #fff; border: 1px solid var(--line); color: #1f2937; text-align: left; display: flex; justify-content: space-between; align-items: center; }
    .nav button.on { background: linear-gradient(135deg,#dffbf4,#c8fff2); color: #064e3b; border-color: #7ee7d4; }
    .primary { background: linear-gradient(135deg,#6edac6,#a7f3d0); color: #102a2a; }
    .ghost { background: #f1fffb; color: #0f766e; border: 1px solid var(--line); }
    .danger { background: var(--danger-bg); color: var(--danger); }
    .main { width: 100%; max-width: 1180px; margin: 0 auto; padding: 28px; }
    .hero { display: grid; grid-template-columns: 1fr 310px; gap: 18px; margin-bottom: 18px; }
    .eyebrow { margin: 0 0 8px; color: #0f9f89; font-weight: 900; letter-spacing: .08em; }
    .hero h2 { font-size: 40px; line-height: 1.12; margin: 0; }
    .hero h2 span { background: linear-gradient(135deg,#10a88f,#5ecbb8); -webkit-background-clip: text; background-clip: text; color: transparent; }
    .growth { background: linear-gradient(135deg,#8debd8,#b8f2e6 60%,#d9fff5); }
    .growth strong { display: block; font-size: 34px; }
    .bar { height: 12px; background: rgba(255,255,255,.75); border-radius: 999px; overflow: hidden; margin: 14px 0; }
    .bar i { display: block; height: 100%; width: 0%; background: linear-gradient(90deg,#16a085,#c8fff2); }
    .view-grid { display: grid; grid-template-columns: 1fr 340px; gap: 18px; }
    .row-task { display: grid; grid-template-columns: 1fr 120px 140px 90px; gap: 10px; }
    .row-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
    .row-3 { display: grid; grid-template-columns: 1.2fr 1fr 120px; gap: 10px; }
    .quick { display: flex; flex-wrap: wrap; gap: 8px; margin: 12px 0; }
    .quick button { background: #fff; border: 1px solid var(--line); color: #1f2937; border-radius: 999px; padding: 9px 12px; }
    .task-item { display: grid; grid-template-columns: auto 1fr auto; gap: 12px; align-items: center; background: linear-gradient(135deg,#fff,#f2fffb); border: 1px solid var(--line); border-radius: 20px; padding: 14px; margin: 10px 0; }
    .task-item.done { opacity: .62; }
    .task-item.done .task-title { text-decoration: line-through; }
    .check { width: 26px; height: 26px; padding: 0; border: 2px solid #93dcca; background: #fff; color: #fff; border-radius: 9px; }
    .task-item.done .check { background: var(--green); }
    .task-title { font-weight: 900; line-height: 1.4; }
    .meta { color: var(--sub); font-size: 13px; margin-top: 6px; line-height: 1.65; }
    .sub { color: var(--sub); line-height: 1.7; }
    .hidden { display: none !important; }
    .settings { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
    .notice { background: var(--yellow); color: #5f4b00; border: 1px solid #f9e58c; border-radius: 18px; padding: 14px; line-height: 1.7; margin: 12px 0; }
    .progress-shell { height: 16px; border-radius: 999px; background: #e8fff8; border: 1px solid var(--line); overflow: hidden; margin: 14px 0; }
    .progress-fill { height: 100%; width: 0%; background: linear-gradient(90deg,#16a085,#8debd8); }
    .kpis { display: grid; grid-template-columns: repeat(3,1fr); gap: 12px; margin-top: 14px; }
    .kpis div { background: #fff; border: 1px solid var(--line); border-radius: 18px; padding: 14px; }
    .kpis b { display: block; font-size: 23px; margin-top: 5px; }
    .toast { position: fixed; left: 50%; bottom: 24px; transform: translateX(-50%) translateY(20px); opacity: 0; pointer-events: none; background: linear-gradient(135deg,#6edac6,#a7f3d0); color: #102a2a; padding: 12px 16px; border-radius: 999px; font-weight: 900; transition: .2s; box-shadow: var(--shadow); max-width: 90vw; }
    .toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }
    @media(max-width: 900px) {
      .app, .hero, .view-grid, .row-task, .row-2, .row-3, .settings, .kpis { grid-template-columns: 1fr; }
      .side { position: relative; height: auto; }
      .main { padding: 18px; }
      .hero h2 { font-size: 32px; }
    }
  </style>
</head>
<body>
<div class="app">
  <aside class="side">
    <div class="brand">
      <div class="logo">开</div>
      <div><h1>开开的博士成长计划</h1><p>计划 · 论文 · 复盘 · 云同步</p></div>
    </div>
    <div class="card today-card">
      <b id="dateText"></b>
      <p class="sub" style="margin:8px 0 12px">博士成长不是冲刺，是每天可追踪的一点点推进。</p>
      <span id="syncStatus" class="status">本地模式</span>
    </div>
    <div class="nav">
      <button class="on" data-view="today">今日计划 <b id="countToday">0</b></button>
      <button data-view="thesis">论文进度 <b id="countThesis">0%</b></button>
      <button data-view="review">复盘归档 <b id="countDone">0</b></button>
      <button data-view="report">周报月报 <b>2</b></button>
      <button data-view="cloud">云同步 <b>3.2</b></button>
    </div>
    <button id="pushSideBtn" class="ghost">推送云端</button>
    <button id="pullSideBtn" class="ghost">拉取云端</button>
    <button id="exportBtn" class="ghost">导出全部</button>
    <button id="clearBtn" class="danger">清空本地</button>
  </aside>

  <main class="main">
    <section class="hero">
      <div class="card">
        <p class="eyebrow">KAIKAI PHD GROWTH PLAN</p>
        <h2>把今天的小推进，叠成<span>博士成长曲线</span></h2>
      </div>
      <div class="card growth">
        <span>今日完成率</span>
        <strong id="rateText">0%</strong>
        <div class="bar"><i id="rateBar"></i></div>
        <small id="rateHint">先添加一个小任务，给今天点火。</small>
      </div>
    </section>

    <section id="view-today" class="view view-grid">
      <div class="card">
        <h2>今日计划</h2>
        <div class="row-task">
          <input id="taskInput" placeholder="例如：整理模型参数表" />
          <select id="typeInput"><option>论文</option><option>模型</option><option>文献</option><option>组会</option><option>比赛</option><option>行政</option><option>生活</option></select>
          <select id="priorityInput"><option value="today">今天必须动</option><option value="week">本周推进</option><option value="low">有空再说</option></select>
          <button id="addTaskBtn" class="primary">加入</button>
        </div>
        <div class="quick">
          <button data-template="读一篇文献，整理研究问题、方法、创新点和可借鉴处" data-type="文献">文献速读</button>
          <button data-template="整理组会汇报：完成、卡点、下周计划各三行" data-type="组会">组会汇报</button>
          <button data-template="检查模型报错日志，记录原因和下一步尝试" data-type="模型">模型排错</button>
          <button data-template="推进论文正文一个小段落，至少写出200字" data-type="论文">论文推进</button>
        </div>
        <div id="taskList"></div>
      </div>
      <aside>
        <div class="card">
          <h2>今日打卡</h2>
          <input id="focusInput" placeholder="今日主线" />
          <div class="row-2" style="margin:10px 0">
            <select id="energyInput"><option>高</option><option selected>中</option><option>低</option></select>
            <select id="moodInput"><option selected>稳定</option><option>焦虑</option><option>疲惫</option><option>兴奋</option></select>
          </div>
          <textarea id="noteInput" placeholder="卡点、灵感、导师建议"></textarea>
          <button id="saveDailyBtn" class="primary" style="width:100%;margin-top:10px">保存打卡</button>
        </div>
        <div class="card" style="margin-top:18px"><h2>今日建议</h2><p id="adviceText" class="sub">先选一个 15 分钟能启动的任务。</p></div>
      </aside>
    </section>

    <section id="view-thesis" class="view card hidden">
      <h2>论文进度</h2>
      <div class="row-3">
        <input id="thesisTitleInput" placeholder="论文题目 / 当前研究主题" />
        <select id="thesisStageInput"><option>选题构思</option><option>文献综述</option><option>数据处理</option><option>模型构建</option><option>结果分析</option><option>论文写作</option><option>修改定稿</option><option>答辩准备</option></select>
        <input id="thesisProgressInput" type="number" min="0" max="100" placeholder="进度%" />
      </div>
      <div class="progress-shell"><div id="thesisBar" class="progress-fill"></div></div>
      <div class="row-2">
        <textarea id="thesisDoneInput" placeholder="已完成：例如 完成研究框架、跑通模型、整理5篇核心文献"></textarea>
        <textarea id="thesisNextInput" placeholder="下一步：例如 补充理论机制、清洗数据、写方法部分"></textarea>
      </div>
      <textarea id="thesisBlockersInput" style="margin-top:10px" placeholder="当前卡点 / 需要导师反馈的问题"></textarea>
      <button id="saveThesisBtn" class="primary" style="margin-top:10px">保存论文进度</button>
      <div class="kpis">
        <div><span class="sub">当前阶段</span><b id="thesisStageView">-</b></div>
        <div><span class="sub">总体进度</span><b id="thesisProgressView">0%</b></div>
        <div><span class="sub">最近更新</span><b id="thesisUpdatedView">-</b></div>
      </div>
    </section>

    <section id="view-review" class="view card hidden">
      <h2>复盘归档</h2>
      <button id="generateReviewBtn" class="primary">生成复盘</button>
      <button id="saveReviewBtn" class="ghost">保存归档</button>
      <textarea id="reviewText" style="margin-top:12px" placeholder="点击生成复盘"></textarea>
      <h3>成长档案</h3>
      <div id="archiveList"></div>
    </section>

    <section id="view-report" class="view card hidden">
      <h2>周报 / 月报</h2>
      <button id="weekReportBtn" class="primary">生成周报</button>
      <button id="monthReportBtn" class="ghost">生成月报</button>
      <textarea id="reportText" style="margin-top:12px"></textarea>
    </section>

    <section id="view-cloud" class="view card hidden">
      <h2>Supabase 云同步</h2>
      <div class="notice"><b>只填写 Project URL 和 anon public key，不要填 service_role key。</b></div>
      <div class="settings">
        <input id="supabaseUrlInput" placeholder="Supabase Project URL" />
        <input id="supabaseAnonInput" placeholder="Supabase anon public key" />
        <input id="emailInput" placeholder="邮箱" />
        <input id="passwordInput" type="password" placeholder="密码，至少6位" />
      </div>
      <div class="quick">
        <button id="testConfigBtn" class="ghost">测试配置</button>
        <button id="signupBtn" class="ghost">注册</button>
        <button id="loginBtn" class="primary">登录</button>
        <button id="pushCloudBtn" class="ghost">推送云端</button>
        <button id="pullCloudBtn" class="ghost">拉取云端</button>
        <button id="logoutBtn" class="danger">退出</button>
      </div>
    </section>
  </main>
</div>
<div id="toast" class="toast"></div>

<script>
const STORAGE_KEY = 'kaikai_growth_32';
const SETTINGS_KEY = 'kaikai_growth_32_settings';
const TODAY = toDateKey(new Date());
const priorityLabel = { today: '今天必须动', week: '本周推进', low: '有空再说' };
let state = loadState();
let settings = loadSettings();
let supabaseClient = null;
let currentUser = null;

function $(id) { return document.getElementById(id); }
function toDateKey(date) {
  const y = date.getFullYear();
  const m = String(date.getMonth() + 1).padStart(2, '0');
  const d = String(date.getDate()).padStart(2, '0');
  return `${y}-${m}-${d}`;
}
function parseDateKey(key) { return new Date(`${key}T00:00:00`); }
function daysBetween(a, b) { return Math.max(0, Math.floor((parseDateKey(b) - parseDateKey(a)) / 86400000)); }
function loadState() {
  try { return Object.assign({ tasks: [], daily: {}, archive: {}, thesis: {} }, JSON.parse(localStorage.getItem(STORAGE_KEY) || '{}')); }
  catch { return { tasks: [], daily: {}, archive: {}, thesis: {} }; }
}
function loadSettings() {
  try { return Object.assign({ url: '', anon: '', email: '' }, JSON.parse(localStorage.getItem(SETTINGS_KEY) || '{}')); }
  catch { return { url: '', anon: '', email: '' }; }
}
function toast(message) {
  const node = $('toast');
  node.textContent = message;
  node.classList.add('show');
  setTimeout(() => node.classList.remove('show'), 2200);
}
function escapeHtml(value) {
  return String(value ?? '').replace(/[&<>"']/g, ch => ({ '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#039;' }[ch]));
}
function formatTime(value) {
  if (!value) return '-';
  const date = new Date(value);
  if (Number.isNaN(date.getTime())) return value;
  return date.toLocaleString('zh-CN', { year: 'numeric', month: '2-digit', day: '2-digit', hour: '2-digit', minute: '2-digit' });
}
function saveLocal() {
  localStorage.setItem(STORAGE_KEY, JSON.stringify(state));
  render();
}
function ensureToday() {
  if (!state.daily) state.daily = {};
  if (!state.daily[TODAY]) state.daily[TODAY] = { focus: '', energy: '中', mood: '稳定', note: '' };
  if (!state.thesis) state.thesis = { title: '', stage: '选题构思', progress: 0, done: '', next: '', blockers: '', updatedAt: '' };
}
function normalizeTask(task) {
  const createdDate = task.createdDate || task.created || task.assignedDate || TODAY;
  const completedDate = task.completedDate || task.completed || null;
  const assignedAt = task.assignedAt || task.createdAt || `${createdDate}T09:00:00`;
  return {
    id: task.id || (crypto.randomUUID ? crypto.randomUUID() : String(Date.now() + Math.random())),
    text: task.text || '',
    type: task.type || '论文',
    priority: task.priority || task.pri || 'today',
    done: Boolean(task.done),
    createdDate,
    dueDate: task.dueDate || task.due || createdDate,
    assignedAt,
    completedDate,
    completedAt: task.completedAt || (completedDate ? `${completedDate}T18:00:00` : null),
    carryCount: Number(task.carryCount || 0)
  };
}
function migrateState() {
  ensureToday();
  state.tasks = (state.tasks || []).map(normalizeTask);
  carryOverTasks();
  localStorage.setItem(STORAGE_KEY, JSON.stringify(state));
}
function carryOverTasks() {
  let count = 0;
  state.tasks.forEach(task => {
    if (!task.done && task.dueDate < TODAY) {
      const add = daysBetween(task.dueDate, TODAY) || 1;
      task.previousDueDate = task.dueDate;
      task.dueDate = TODAY;
      task.carryCount = Number(task.carryCount || 0) + add;
      count += 1;
    }
  });
  if (count) toast(`有 ${count} 个未完成任务已叠加到今天`);
}
function todayTasks() {
  return state.tasks
    .filter(task => !task.done && task.dueDate <= TODAY)
    .sort((a, b) => {
      const weights = { today: 0, week: 1, low: 2 };
      return (weights[a.priority] ?? 9) - (weights[b.priority] ?? 9) || new Date(a.assignedAt) - new Date(b.assignedAt);
    });
}
function addTask(text, type, priority) {
  const taskText = (text || $('taskInput').value).trim();
  if (!taskText) return toast('先写一个具体动作');
  const now = new Date().toISOString();
  state.tasks.unshift({
    id: crypto.randomUUID ? crypto.randomUUID() : String(Date.now()),
    text: taskText,
    type: type || $('typeInput').value,
    priority: priority || $('priorityInput').value,
    done: false,
    createdDate: TODAY,
    dueDate: TODAY,
    assignedAt: now,
    completedDate: null,
    completedAt: null,
    carryCount: 0
  });
  $('taskInput').value = '';
  saveLocal();
}
function toggleTask(id) {
  state.tasks = state.tasks.map(task => {
    if (task.id !== id) return task;
    const done = !task.done;
    return { ...task, done, completedDate: done ? TODAY : null, completedAt: done ? new Date().toISOString() : null };
  });
  saveLocal();
}
function deleteTask(id) {
  state.tasks = state.tasks.filter(task => task.id !== id);
  saveLocal();
}
function renderTasks() {
  const tasks = todayTasks();
  const list = $('taskList');
  if (!tasks.length) {
    list.innerHTML = '<p class="sub">这里暂时很安静，写一个 15 分钟能启动的小动作吧。</p>';
    return;
  }
  list.innerHTML = tasks.map(task => `
    <div class="task-item ${task.done ? 'done' : ''}">
      <button class="check" onclick="toggleTask('${task.id}')">${task.done ? '✓' : ''}</button>
      <div>
        <div class="task-title">${escapeHtml(task.text)}</div>
        <div class="meta">${escapeHtml(task.type)} · ${priorityLabel[task.priority] || task.priority} · 布置：${formatTime(task.assignedAt)}${task.completedAt ? ' · 完成：' + formatTime(task.completedAt) : ''}${task.carryCount ? ' · 已叠加 ' + task.carryCount + ' 天' : ''}</div>
      </div>
      <button class="ghost" onclick="deleteTask('${task.id}')">删除</button>
    </div>
  `).join('');
}
function saveDaily() {
  state.daily[TODAY] = { focus: $('focusInput').value, energy: $('energyInput').value, mood: $('moodInput').value, note: $('noteInput').value };
  saveLocal();
  toast('打卡已保存');
}
function fillDaily() {
  ensureToday();
  const daily = state.daily[TODAY];
  $('focusInput').value = daily.focus || '';
  $('energyInput').value = daily.energy || '中';
  $('moodInput').value = daily.mood || '稳定';
  $('noteInput').value = daily.note || '';
}
function saveThesis() {
  state.thesis = {
    title: $('thesisTitleInput').value,
    stage: $('thesisStageInput').value,
    progress: Math.max(0, Math.min(100, Number($('thesisProgressInput').value || 0))),
    done: $('thesisDoneInput').value,
    next: $('thesisNextInput').value,
    blockers: $('thesisBlockersInput').value,
    updatedAt: new Date().toISOString()
  };
  saveLocal();
  toast('论文进度已保存');
}
function fillThesis() {
  ensureToday();
  const thesis = state.thesis || {};
  $('thesisTitleInput').value = thesis.title || '';
  $('thesisStageInput').value = thesis.stage || '选题构思';
  $('thesisProgressInput').value = thesis.progress || 0;
  $('thesisDoneInput').value = thesis.done || '';
  $('thesisNextInput').value = thesis.next || '';
  $('thesisBlockersInput').value = thesis.blockers || '';
}
function renderThesis() {
  const thesis = state.thesis || {};
  const progress = Number(thesis.progress || 0);
  $('thesisBar').style.width = `${progress}%`;
  $('thesisProgressView').textContent = `${progress}%`;
  $('thesisStageView').textContent = thesis.stage || '-';
  $('thesisUpdatedView').textContent = thesis.updatedAt ? new Date(thesis.updatedAt).toLocaleDateString('zh-CN') : '-';
  $('countThesis').textContent = `${progress}%`;
}
function buildAdvice() {
  const left = todayTasks().length;
  const done = state.tasks.filter(task => task.completedDate === TODAY).length;
  if (left >= 4) return '今天任务偏多，建议只保留 3 个核心任务，其余移入本周。';
  if (done === 0) return '先完成一个 15 分钟任务，给大脑一个启动信号。';
  return '保持节奏，明天优先处理一个最影响进度的卡点。';
}
function generateReview() {
  ensureToday();
  const daily = state.daily[TODAY];
  const thesis = state.thesis || {};
  const done = state.tasks.filter(task => task.completedDate === TODAY);
  const left = todayTasks();
  $('reviewText').value = `【${TODAY} 开开的博士成长复盘】

一、今日主线
${daily.focus || '未填写'}

二、论文进度
题目/主题：${thesis.title || '未填写'}
阶段：${thesis.stage || '-'}
总体进度：${thesis.progress || 0}%
下一步：${thesis.next || '未填写'}

三、今日状态
精力：${daily.energy || '中'}
状态：${daily.mood || '稳定'}

四、今日完成
${done.length ? done.map((task, index) => `${index + 1}. ${task.text}（${task.type}，布置：${formatTime(task.assignedAt)}，完成：${formatTime(task.completedAt)}）`).join('\n') : '暂无完成任务'}

五、仍需推进
${left.length ? left.map((task, index) => `${index + 1}. ${task.text}（${priorityLabel[task.priority] || task.priority}，已叠加 ${task.carryCount || 0} 天）`).join('\n') : '今日主线已基本清空'}

六、记录与卡点
${daily.note || '暂无记录'}

七、明日建议
${buildAdvice()}`;
}
function saveReview() {
  const text = $('reviewText').value.trim();
  if (!text) return toast('先生成复盘');
  state.archive[TODAY] = { text, done: state.tasks.filter(task => task.completedDate === TODAY).length, savedAt: new Date().toISOString() };
  saveLocal();
  toast('已归档');
}
function renderArchive() {
  const keys = Object.keys(state.archive || {}).sort().reverse();
  $('archiveList').innerHTML = keys.length ? keys.map(key => `
    <div class="task-item">
      <div><b>${key}</b><div class="meta">完成 ${state.archive[key].done || 0} 项</div></div>
      <button class="ghost" onclick="loadArchive('${key}')">查看</button>
    </div>
  `).join('') : '<p class="sub">还没有归档。</p>';
  $('countDone').textContent = state.tasks.filter(task => task.completedDate === TODAY).length;
}
function loadArchive(key) {
  $('reviewText').value = state.archive[key].text || '';
  showView('review');
}
function generateReport(days) {
  const end = new Date();
  const start = new Date();
  start.setDate(end.getDate() - days + 1);
  const startKey = toDateKey(start);
  const done = state.tasks.filter(task => task.completedDate && task.completedDate >= startKey && task.completedDate <= TODAY);
  const left = state.tasks.filter(task => !task.done);
  const thesis = state.thesis || {};
  $('reportText').value = `【开开的博士成长${days === 7 ? '周报' : '月报'}】
周期：${startKey} 至 ${TODAY}

一、论文进度
题目/主题：${thesis.title || '未填写'}
阶段：${thesis.stage || '-'}
总体进度：${thesis.progress || 0}%
已完成：${thesis.done || '未填写'}
下一步：${thesis.next || '未填写'}
卡点：${thesis.blockers || '未填写'}

二、完成概况
完成 ${done.length} 项。

三、代表性完成
${done.length ? done.map((task, index) => `${index + 1}. ${task.text}（${task.type}，布置：${formatTime(task.assignedAt)}，完成：${formatTime(task.completedAt)}）`).join('\n') : '暂无完成记录'}

四、遗留任务
${left.length ? left.slice(0, 10).map((task, index) => `${index + 1}. ${task.text}（${priorityLabel[task.priority] || task.priority}，布置：${formatTime(task.assignedAt)}，叠加 ${task.carryCount || 0} 天）`).join('\n') : '暂无遗留任务'}

五、下阶段建议
1. 每天只保留 1 个主线任务 + 2 个辅助任务。
2. 把高频卡点沉淀成固定流程。
3. 周末用 20 分钟回看成长档案。`;
  showView('report');
}
function renderStats() {
  const todayAll = state.tasks.filter(task => task.dueDate === TODAY || task.completedDate === TODAY);
  const todayDone = state.tasks.filter(task => task.completedDate === TODAY);
  const rate = todayAll.length ? Math.round(todayDone.length / todayAll.length * 100) : 0;
  $('rateText').textContent = `${rate}%`;
  $('rateBar').style.width = `${rate}%`;
  $('rateHint').textContent = todayAll.length ? `今日已完成 ${todayDone.length}/${todayAll.length} 项` : '先添加一个小任务，给今天点火。';
  $('countToday').textContent = todayTasks().length;
  $('adviceText').textContent = buildAdvice();
}
function render() {
  $('dateText').textContent = new Date().toLocaleDateString('zh-CN', { month: 'long', day: 'numeric', weekday: 'long' });
  renderTasks();
  renderStats();
  renderArchive();
  renderThesis();
  renderSyncStatus();
}
function showView(view) {
  document.querySelectorAll('.view').forEach(node => node.classList.add('hidden'));
  $(`view-${view}`).classList.remove('hidden');
  document.querySelectorAll('.nav button').forEach(btn => btn.classList.toggle('on', btn.dataset.view === view));
}
function exportAll() {
  const thesis = state.thesis || {};
  const lines = [
    '# 开开的博士成长计划导出',
    '',
    `导出时间：${formatTime(new Date().toISOString())}`,
    '',
    '## 论文进度',
    `- 题目/主题：${thesis.title || ''}`,
    `- 当前阶段：${thesis.stage || ''}`,
    `- 总体进度：${thesis.progress || 0}%`,
    `- 已完成：${String(thesis.done || '').replace(/\n/g, '；')}`,
    `- 下一步：${String(thesis.next || '').replace(/\n/g, '；')}`,
    `- 卡点/需反馈：${String(thesis.blockers || '').replace(/\n/g, '；')}`,
    `- 最近更新：${formatTime(thesis.updatedAt)}`,
    '',
    '## 任务记录',
    ...state.tasks.map(task => `- [${task.done ? 'x' : ' '}] ${task.text} #${task.type} #${priorityLabel[task.priority] || task.priority} | 布置时间：${formatTime(task.assignedAt)} | 完成时间：${task.completedAt ? formatTime(task.completedAt) : '未完成'} | 当前待办日期：${task.dueDate || ''} | 叠加天数：${task.carryCount || 0}`),
    '',
    '## 成长档案',
    ...Object.keys(state.archive || {}).sort().map(key => `### ${key}\n${state.archive[key].text || ''}`)
  ];
  const blob = new Blob([lines.join('\n')], { type: 'text/markdown;charset=utf-8' });
  const url = URL.createObjectURL(blob);
  const anchor = document.createElement('a');
  anchor.href = url;
  anchor.download = `开开的博士成长计划_${TODAY}.md`;
  document.body.appendChild(anchor);
  anchor.click();
  anchor.remove();
  URL.revokeObjectURL(url);
}
function initSupabaseFromInputs() {
  settings.url = $('supabaseUrlInput').value.trim();
  settings.anon = $('supabaseAnonInput').value.trim();
  settings.email = $('emailInput').value.trim();
  localStorage.setItem(SETTINGS_KEY, JSON.stringify(settings));
  if (!settings.url || !settings.anon) { toast('先填写 URL 和 anon key'); return null; }
  if (!window.supabase) { toast('Supabase SDK 未加载，检查网络或 CDN'); return null; }
  supabaseClient = window.supabase.createClient(settings.url, settings.anon);
  return supabaseClient;
}
async function refreshUser() {
  if (!supabaseClient && settings.url && settings.anon && window.supabase) supabaseClient = window.supabase.createClient(settings.url, settings.anon);
  if (!supabaseClient) return null;
  const { data } = await supabaseClient.auth.getUser();
  currentUser = data.user || null;
  return currentUser;
}
function renderSyncStatus() {
  const node = $('syncStatus');
  if (currentUser) { node.textContent = 'Supabase 已登录'; node.className = 'status ok'; }
  else if (settings.url && settings.anon) { node.textContent = '已配置未登录'; node.className = 'status'; }
  else { node.textContent = '本地模式'; node.className = 'status'; }
}
async function testConfig() {
  if (!initSupabaseFromInputs()) return;
  toast('配置可用，下一步注册或登录');
  await refreshUser();
  renderSyncStatus();
}
async function signup() {
  if (!initSupabaseFromInputs()) return;
  const email = $('emailInput').value.trim();
  const password = $('passwordInput').value;
  const { data, error } = await supabaseClient.auth.signUp({ email, password });
  if (error) return toast(`注册失败：${error.message}`);
  currentUser = data.user || null;
  toast(data.session ? '注册并登录成功' : '注册成功，请邮箱确认后登录');
  renderSyncStatus();
}
async function login() {
  if (!initSupabaseFromInputs()) return;
  const email = $('emailInput').value.trim();
  const password = $('passwordInput').value;
  const { data, error } = await supabaseClient.auth.signInWithPassword({ email, password });
  if (error) return toast(`登录失败：${error.message}`);
  currentUser = data.user;
  toast('登录成功');
  renderSyncStatus();
}
async function logout() {
  if (supabaseClient) await supabaseClient.auth.signOut();
  currentUser = null;
  toast('已退出');
  renderSyncStatus();
}
async function pushCloud() {
  await refreshUser();
  if (!currentUser) { showView('cloud'); return toast('请先登录'); }
  const { error } = await supabaseClient.from('research_growth_states').upsert({ user_id: currentUser.id, state, updated_at: new Date().toISOString() }, { onConflict: 'user_id' });
  if (error) return toast(`推送失败：${error.message}`);
  toast('已推送云端');
}
async function pullCloud() {
  await refreshUser();
  if (!currentUser) { showView('cloud'); return toast('请先登录'); }
  const { data, error } = await supabaseClient.from('research_growth_states').select('state').eq('user_id', currentUser.id).maybeSingle();
  if (error) return toast(`拉取失败：${error.message}`);
  if (!data || !data.state) return toast('云端还没有数据，先推送一次');
  state = Object.assign({ tasks: [], daily: {}, archive: {}, thesis: {} }, data.state);
  migrateState();
  fillDaily();
  fillThesis();
  render();
  toast('已拉取云端');
}
function bindEvents() {
  $('addTaskBtn').addEventListener('click', () => addTask());
  $('taskInput').addEventListener('keydown', event => { if (event.key === 'Enter') addTask(); });
  document.querySelectorAll('.quick button[data-template]').forEach(btn => {
    btn.addEventListener('click', () => { $('taskInput').value = btn.dataset.template; $('typeInput').value = btn.dataset.type || '论文'; });
  });
  document.querySelectorAll('.nav button').forEach(btn => btn.addEventListener('click', () => showView(btn.dataset.view)));
  $('saveDailyBtn').addEventListener('click', saveDaily);
  $('saveThesisBtn').addEventListener('click', saveThesis);
  $('generateReviewBtn').addEventListener('click', generateReview);
  $('saveReviewBtn').addEventListener('click', saveReview);
  $('weekReportBtn').addEventListener('click', () => generateReport(7));
  $('monthReportBtn').addEventListener('click', () => generateReport(30));
  $('exportBtn').addEventListener('click', exportAll);
  $('clearBtn').addEventListener('click', () => {
    if (!confirm('清空本地数据？云端不会自动删除。')) return;
    state = { tasks: [], daily: {}, archive: {}, thesis: {} };
    migrateState();
    fillDaily();
    fillThesis();
    saveLocal();
  });
  $('testConfigBtn').addEventListener('click', testConfig);
  $('signupBtn').addEventListener('click', signup);
  $('loginBtn').addEventListener('click', login);
  $('logoutBtn').addEventListener('click', logout);
  $('pushCloudBtn').addEventListener('click', pushCloud);
  $('pullCloudBtn').addEventListener('click', pullCloud);
  $('pushSideBtn').addEventListener('click', pushCloud);
  $('pullSideBtn').addEventListener('click', pullCloud);
}
async function init() {
  migrateState();
  $('supabaseUrlInput').value = settings.url || '';
  $('supabaseAnonInput').value = settings.anon || '';
  $('emailInput').value = settings.email || '';
  if (settings.url && settings.anon && window.supabase) {
    supabaseClient = window.supabase.createClient(settings.url, settings.anon);
    await refreshUser();
  }
  if (!state.tasks.length) {
    state.tasks = [
      normalizeTask({ id: 'demo1', text: '确定今天最重要的科研主线，并拆成一个15分钟动作', type: '论文', priority: 'today', createdDate: TODAY }),
      normalizeTask({ id: 'demo2', text: '整理组会汇报：完成、卡点、下周计划各写三行', type: '组会', priority: 'week', createdDate: TODAY })
    ];
    localStorage.setItem(STORAGE_KEY, JSON.stringify(state));
  }
  bindEvents();
  fillDaily();
  fillThesis();
  render();
}
init();
</script>
</body>
</html>
